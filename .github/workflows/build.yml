name: Build ZMK Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:2.5
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr Export
        run: west zephyr-export
      - name: West Build
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=skew68 -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Firmware
        run: cp build/zephyr/zmk.uf2 skew68_nice_nano_v2.uf2
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: skew68_nice_nano_v2.uf2
